<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <rect width="64" height="64" rx="15" fill="url(#shine)"/>

  <!-- Brain body: left hemisphere -->
  <path d="
    M32 42
    C32 42 17 41 15 32
    C13 25 16 19 21 17
    C20 14 22 11 25 11
    C27 9 30 9 32 11
    L32 42Z"
    fill="#FECACA" stroke="#FCA5A5" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Brain body: right hemisphere -->
  <path d="
    M32 42
    C32 42 47 41 49 32
    C51 25 48 19 43 17
    C44 14 42 11 39 11
    C37 9 34 9 32 11
    L32 42Z"
    fill="#FECACA" stroke="#FCA5A5" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Brain stem -->
  <rect x="28" y="41" width="8" height="5" rx="2.5" fill="#FCA5A5"/>

  <!-- Center crease -->
  <line x1="32" y1="12" x2="32" y2="41" stroke="#FCA5A5" stroke-width="1" stroke-dasharray="2,1.5"/>

  <!-- Left folds -->
  <path d="M22 20 C20 23 21 27 23 29" fill="none" stroke="#F87171" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M18 28 C19 32 22 34 25 35" fill="none" stroke="#F87171" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M25 14 C24 17 25 20 27 22" fill="none" stroke="#F87171" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Right folds -->
  <path d="M42 20 C44 23 43 27 41 29" fill="none" stroke="#F87171" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M46 28 C45 32 42 34 39 35" fill="none" stroke="#F87171" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M39 14 C40 17 39 20 37 22" fill="none" stroke="#F87171" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Gold coin badge bottom-right -->
  <circle cx="48" cy="48" r="10" fill="#F59E0B"/>
  <circle cx="48" cy="48" r="10" fill="url(#coinshine)" opacity="0.3"/>
  <circle cx="48" cy="48" r="8.5" fill="none" stroke="#FBBF24" stroke-width="1.2"/>
  <!-- Clock hands -->
  <circle cx="48" cy="48" r="5.5" fill="none" stroke="white" stroke-width="1.2"/>
  <line x1="48" y1="48" x2="48" y2="44.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="48" y1="48" x2="50.5" y2="49.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="48" cy="48" r="0.8" fill="white"/>
</svg>
